name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: Deploy Website
        run: |
          CODE=${{ secrets.CODE }}
          php verify_code.php
        env:
          CODE: ${{ secrets.CODE }}